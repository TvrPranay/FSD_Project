<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ID-PAY — Verify OTP</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
    <link href="/static/css/app.min.css" rel="stylesheet">
</head>
<body class="bg-body-tertiary min-vh-100 d-flex align-items-center justify-content-center p-4">
    <main class="card shadow border-0 p-4 p-md-5" style="max-width: 450px;">
        <header class="text-center mb-4">
            <div class="d-flex align-items-center justify-content-center gap-2 mb-3 p-3 rounded-3 bg-info bg-opacity-10 mx-auto" style="width: 70px;">
                <i class="bi bi-shield-check text-info fs-4"></i>
            </div>
            <h1 class="h3 fw-bold mb-2">Verify OTP</h1>
            <p class="text-muted mb-0">Enter OTP sent to your email</p>
        </header>

        {% if error %}
        <div class="alert alert-danger mb-4">{{ error }}</div>
        {% endif %}

        <form id="otpForm" method="POST" action="/verify_otp" class="needs-validation" novalidate>
            <div class="mb-4">
                <label for="otp" class="form-label fw-medium mb-2">OTP Code</label>
                <div class="input-group input-group-lg">
                    <span class="input-group-text">
                        <i class="bi bi-shield-lock"></i>
                    </span>
                    <input type="text" class="form-control text-center fw-bold fs-4" id="otp" name="otp" maxlength="6" placeholder="123456" required>
                </div>
                <div class="invalid-feedback">Enter valid 6-digit OTP.</div>
                <div class="form-text mt-1">
                    <small class="text-muted">Didn't receive? <a href="#" class="text-decoration-none">Resend</a></small>
                </div>
            </div>

            <div class="row g-3 mb-4">
                <div class="col-md-8 position-relative">
                    <label for="new_password" class="form-label fw-medium mb-2">New Password</label>
                    <input type="password" class="form-control form-control-lg" id="new_password" name="new_password" minlength="8" placeholder="New password" required>
                    <button type="button" class="btn btn-link p-0 position-absolute top-50 end-0 translate-middle-y pe-4 toggle-password" data-target="#new_password">
                        <i class="bi bi-eye"></i>
                    </button>
                    <div class="invalid-feedback">Minimum 8 characters.</div>
                </div>
                <div class="col-md-4 position-relative">
                    <label for="confirm_password" class="form-label fw-medium mb-2">Confirm</label>
                    <input type="password" class="form-control form-control-lg" id="confirm_password" placeholder="Confirm" required>
                    <button type="button" class="btn btn-link p-0 position-absolute top-50 end-0 translate-middle-y pe-4 toggle-password" data-target="#confirm_password">
                        <i class="bi bi-eye"></i>
                    </button>
                    <div class="invalid-feedback">Passwords don't match.</div>
                </div>
            </div>

            <button type="submit" class="btn btn-primary btn-lg w-100 py-3 fw-bold mb-3">
                <i class="bi bi-check-lg me-2"></i>Reset Password
            </button>

            <div class="text-center">
                <a href="/forgot" class="btn btn-link p-0 text-decoration-none fw-medium">
                    <i class="bi bi-arrow-left me-1"></i>Change Email
                </a>
            </div>
        </form>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    <script src="/static/js/app.js"></script>
    <script>
        $('#otpForm').on('submit', function(e) {
            const form = $(this)[0];
            if (!form.checkValidity()) {
                e.preventDefault();
                e.stopPropagation();
            }
            $(this).addClass('was-validated');
             
            const pass1 = $('#new_password').val();
            const pass2 = $('#confirm_password').val();
            if (pass1 && pass2 && pass1 !== pass2) {
                $('#confirm_password').addClass('is-invalid');
                e.preventDefault();
            }
        });
 
        $('#otp').on('input', function() {
            this.value = this.value.replace(/[^\d]/g, '').slice(0,6);
            if (this.value.length === 6) {
                $('#otpForm').submit();
            }
        });
    </script>
</body>
</html>
